name: 🚀 Publish Solver to GitHub Packages

on:
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🦀 Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: 🛠️ Install wasm-pack
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: 🍞 Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: ⚙️ Setup Node Registry for GitHub Packages
        uses: actions/setup-node@v4
        with:
          registry-url: 'https://npm.pkg.github.com'
          scope: '@ramo-libre'

      - name: 📦 Build WASM Module
        run: |
          wasm-pack build --target web --out-dir ./solver -- --no-default-features --features wasm

      - name: ✏️ Fix Package Name with jq
        run: |
          jq '.name = "@ramo-libre/solver"' ./solver/package.json > ./solver/package.json.tmp && mv ./solver/package.json.tmp ./solver/package.json

      - name: 🚀 Publish Solver Package
        run: |
          cd solver
          npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
